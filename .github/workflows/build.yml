name: Build Chronos APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip Chronos source
        run: unzip -o chronos-capacitor-v2.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies & sync Capacitor
        working-directory: chronos
        run: |
          npm install
          npx cap add android
          npx cap sync android

      - name: Patch build.gradle – add biometric dependency
        working-directory: chronos
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's|dependencies {|dependencies {\n    implementation "androidx.biometric:biometric:1.1.0"|' "$GRADLE"

      - name: Patch AndroidManifest – biometric permissions
        working-directory: chronos
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.USE_BIOMETRIC" />\n    <uses-permission android:name="android.permission.USE_FINGERPRINT" />\n</manifest>|' "$MANIFEST"

      - name: Inject custom MainActivity (biometric bridge)
        working-directory: chronos
        run: |
          DEST="android/app/src/main/java/com/chronos/app/MainActivity.java"
          cp MainActivity.java "$DEST"

      - name: Patch icons & adaptive icon
        working-directory: chronos
        run: |
          RES_DIR="android/app/src/main/res"

          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "icons/mipmap-${density}/ic_launcher.png"            "${RES_DIR}/mipmap-${density}/ic_launcher.png"
            cp "icons/mipmap-${density}/ic_launcher_round.png"      "${RES_DIR}/mipmap-${density}/ic_launcher_round.png"
            cp "icons/mipmap-${density}/ic_launcher_foreground.png" "${RES_DIR}/mipmap-${density}/ic_launcher_foreground.png"
          done

          mkdir -p "${RES_DIR}/values"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources><color name="ic_launcher_background">#0a0e1a</color></resources>\n' \
            > "${RES_DIR}/values/ic_launcher_background.xml"

          mkdir -p "${RES_DIR}/mipmap-anydpi-v26"
          printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>\n' \
            > "${RES_DIR}/mipmap-anydpi-v26/ic_launcher.xml"
          cp "${RES_DIR}/mipmap-anydpi-v26/ic_launcher.xml" \
             "${RES_DIR}/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Build debug APK
        working-directory: chronos/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronos-debug-apk
          path: chronos/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
