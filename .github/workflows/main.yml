name: Build Monyk APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kod letoltese
        uses: actions/checkout@v4

      - name: JDK 17 beallitasa
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK beallitasa
        uses: android-actions/setup-android@v3

      -  name: gradle-wrapper.jar letoltese
        run: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Gradle futtatasi jog
        run: chmod +x android/gradlew

      - name: APK forditasa
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK feltoltese
        uses: actions/upload-artifact@v4
        with:
          name: MONYK-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
